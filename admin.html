<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ヘルプデスクツール Admin</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
            background: #f4f6f8;
            color: #17212b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
        }

        .appShell {
            width: min(1080px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 48px;
        }

        .topBar {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 22px;
        }

        .topBar a {
            color: #2274a5;
            font-weight: 700;
            text-decoration: none;
        }

        .label {
            margin: 0 0 6px;
            color: #5b6b7b;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0;
        }

        h1,
        h2 {
            margin: 0;
            letter-spacing: 0;
        }

        h1 {
            font-size: 2rem;
        }

        h2 {
            font-size: 1.18rem;
            line-height: 1.35;
        }

        .panel,
        .statusBox {
            background: #ffffff;
            border: 1px solid #dce3ea;
            border-radius: 8px;
            box-shadow: 0 16px 38px rgba(32, 43, 54, 0.08);
        }

        .panel {
            padding: 18px;
            margin-bottom: 18px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 700;
        }

        input,
        textarea,
        button {
            min-height: 44px;
            border-radius: 6px;
            font: inherit;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid #c7d1db;
            padding: 0 13px;
            background: #fbfcfd;
        }

        textarea {
            min-height: 92px;
            padding: 10px 13px;
            resize: vertical;
        }

        input[type="file"] {
            padding: 10px 13px;
        }

        input:focus,
        textarea:focus {
            border-color: #2274a5;
            box-shadow: 0 0 0 3px rgba(34, 116, 165, 0.18);
            outline: none;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        button {
            border: 0;
            padding: 0 16px;
            background: #2274a5;
            color: #ffffff;
            cursor: pointer;
            font-weight: 700;
        }

        button.secondary {
            background: #3f596d;
        }

        button.danger {
            background: #b3261e;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .previewPanel {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }

        .recordImageGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .recordImageItem {
            overflow: hidden;
            border: 1px solid #dce3ea;
            border-radius: 8px;
            background: #ffffff;
        }

        .recordImageItem.isSelected {
            border-color: #2274a5;
            box-shadow: 0 0 0 3px rgba(34, 116, 165, 0.18);
        }

        .recordImageItem .imageZoomButton {
            display: block;
            width: 100%;
            min-height: 0;
            padding: 0;
            border: 0;
            border-radius: 0;
            background: transparent;
            color: inherit;
        }

        .recordImageFrame {
            display: grid;
            place-items: center;
            min-height: 180px;
            padding: 10px;
            background: #eef2f6;
        }

        .recordImageFrame img {
            display: block;
            max-width: 100%;
            max-height: 260px;
            object-fit: contain;
        }

        .pdfFilePreview {
            display: grid;
            gap: 8px;
            place-items: center;
            color: #334455;
            text-align: center;
            overflow-wrap: anywhere;
        }

        .pdfFilePreview strong {
            display: grid;
            place-items: center;
            width: 76px;
            height: 96px;
            border-radius: 6px;
            background: #c62828;
            color: #ffffff;
            font-size: 1.1rem;
        }

        .recordImageCaption {
            margin: 0;
            padding: 10px 12px;
            color: #334455;
            font-size: 0.92rem;
            line-height: 1.45;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .recordImageActions {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            padding: 0 10px 10px;
        }

        .recordImageActions button {
            min-height: 36px;
            padding: 0 10px;
            background: #3f596d;
            font-size: 0.9rem;
        }

        .recordImageActions button.danger {
            background: #b3261e;
        }

        .recordImageActions button:disabled {
            opacity: 0.45;
        }

        .resultMeta {
            margin: 0;
            color: #334455;
            overflow-wrap: anywhere;
        }

        .emptyDataMessage {
            grid-column: 1 / -1;
            margin: 0;
            padding: 24px 16px;
            border: 1px dashed #b8c4cf;
            border-radius: 8px;
            background: #f7f9fb;
            color: #5b6b7b;
            text-align: center;
        }

        .imageComment {
            margin: 0;
            padding: 12px 14px;
            border: 1px solid #dce3ea;
            border-radius: 8px;
            background: #fbfcfd;
            color: #17212b;
            line-height: 1.65;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .listPanel {
            margin-top: 18px;
        }

        .imageList {
            display: grid;
            gap: 10px;
            margin-top: 12px;
        }

        .imageListRow {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            gap: 10px;
            align-items: center;
            padding: 10px;
            border: 1px solid #dce3ea;
            border-radius: 8px;
            background: #fbfcfd;
        }

        .imageListName {
            margin: 0;
            color: #17212b;
            font-weight: 700;
            overflow-wrap: anywhere;
        }

        .imageListRow button {
            min-height: 38px;
        }

        .statusBox {
            padding: 14px 16px;
            color: #334455;
        }

        .hidden {
            display: none;
        }

        code {
            padding: 2px 5px;
            border-radius: 4px;
            background: #eef2f6;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: grid;
            place-items: center;
            padding: 24px;
            background: rgba(11, 18, 26, 0.78);
        }

        .lightbox.hidden {
            display: none;
        }

        .lightboxPanel {
            width: min(100%, 1080px);
            max-height: calc(100vh - 48px);
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            overflow: hidden;
            border-radius: 8px;
            background: #ffffff;
        }

        .lightboxHeader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border-bottom: 1px solid #dce3ea;
        }

        .lightboxHeader p {
            margin: 0;
            font-weight: 700;
            overflow-wrap: anywhere;
        }

        .lightboxClose {
            min-height: 36px;
            width: 44px;
            padding: 0;
            font-size: 1.25rem;
        }

        .lightboxImageWrap {
            display: grid;
            place-items: center;
            min-height: 0;
            background: #101820;
        }

        .lightboxImageWrap img {
            display: block;
            max-width: 100%;
            max-height: calc(100vh - 180px);
            object-fit: contain;
        }

        .lightboxImageWrap iframe {
            width: 100%;
            height: calc(100vh - 180px);
            min-height: 420px;
            border: 0;
            background: #ffffff;
        }

        .lightboxImageWrap img.hidden,
        .lightboxImageWrap iframe.hidden {
            display: none;
        }

        .lightboxComment {
            margin: 0;
            padding: 12px 14px;
            line-height: 1.55;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        @media (max-width: 720px) {
            .appShell {
                width: min(100% - 20px, 1080px);
                padding-top: 18px;
            }

            .topBar {
                align-items: start;
                flex-direction: column;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .imageListRow {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="appShell">
        <header class="topBar">
            <div>
                <p class="label">管理者画面</p>
                <h1>ヘルプデスクツール Admin</h1>
            </div>
            <a href="index.html">検索ページへ</a>
        </header>

        <section class="panel" id="loginPanel">
            <p class="label">GitHub設定</p>
            <div class="grid">
                <div class="field full">
                    <label for="token">GitHub Token</label>
                    <input id="token" type="password" autocomplete="off" placeholder="Contents Read and write">
                </div>
            </div>
            <div class="actions">
                <button id="loginButton" type="button">GitHub接続</button>
            </div>
        </section>

        <section class="panel hidden" id="adminPanel">
            <p class="label">画像・PDF管理</p>
            <div class="grid">
                <div class="field">
                    <label for="model">検索型番</label>
                    <input id="model" autocomplete="off" placeholder="例: ABC-123">
                </div>
                <div class="field">
                    <label for="title">名称</label>
                    <input id="title" autocomplete="off" placeholder="例: 商品A">
                </div>
                <div class="field">
                    <label for="numbers">登録番号4桁</label>
                    <input id="numbers" autocomplete="off" placeholder="例: 1234, 5678">
                </div>
                <div class="field">
                    <label for="photo">画像・PDF</label>
                    <input id="photo" type="file" accept="image/*,application/pdf,.pdf" multiple>
                </div>
                <div class="field full">
                    <label for="comment">コメント</label>
                    <textarea id="comment" maxlength="1000" placeholder="型番に紐づけるコメント"></textarea>
                </div>
            </div>
            <div class="actions">
                <button id="searchButton" class="secondary" type="button">検索</button>
                <button id="clearButton" class="secondary" type="button">クリア</button>
                <button id="uploadButton" type="button">保存</button>
                <button id="deleteRecordButton" class="danger" type="button" disabled>削除</button>
                <button id="cancelButton" class="secondary" type="button">キャンセル</button>
                <button id="commentButton" class="secondary hidden" type="button" disabled>コメント保存</button>
                <button id="renameButton" class="secondary hidden" type="button" disabled>名前変更</button>
                <button id="deleteButton" class="danger hidden" type="button" disabled>ファイル削除</button>
            </div>
            <div class="previewPanel hidden" id="previewPanel">
                <p class="resultMeta" id="resultMeta"></p>
                <p class="imageComment hidden" id="resultComment"></p>
                <div class="recordImageGrid" id="recordImageGrid"></div>
            </div>

            <div class="listPanel">
                <p class="label">登録ファイル一覧</p>
                <p class="resultMeta" id="imageCount">表示データ枚数: 0枚</p>
                <div class="actions">
                    <button id="refreshListButton" class="secondary" type="button">一覧更新</button>
                </div>
                <div class="imageList" id="imageList"></div>
            </div>
        </section>

        <section class="statusBox" id="status">ログインしてください。</section>

        <div class="lightbox hidden" id="lightbox" role="dialog" aria-modal="true" aria-labelledby="lightboxTitle">
            <div class="lightboxPanel">
                <div class="lightboxHeader">
                    <p id="lightboxTitle"></p>
                    <button class="lightboxClose" id="lightboxClose" type="button" aria-label="閉じる">×</button>
                </div>
                <div class="lightboxImageWrap">
                    <img id="lightboxImage" src="" alt="">
                    <iframe id="lightboxPdf" class="hidden" title="PDFプレビュー"></iframe>
                </div>
                <p class="lightboxComment" id="lightboxComment"></p>
            </div>
        </div>
    </main>

    <script>
        const tokenInput = document.getElementById("token");
        const modelInput = document.getElementById("model");
        const titleInput = document.getElementById("title");
        const numbersInput = document.getElementById("numbers");
        const photoInput = document.getElementById("photo");
        const commentInput = document.getElementById("comment");
        const loginPanel = document.getElementById("loginPanel");
        const adminPanel = document.getElementById("adminPanel");
        const previewPanel = document.getElementById("previewPanel");
        const resultMeta = document.getElementById("resultMeta");
        const resultComment = document.getElementById("resultComment");
        const recordImageGrid = document.getElementById("recordImageGrid");
        const statusBox = document.getElementById("status");
        const loginButton = document.getElementById("loginButton");
        const uploadButton = document.getElementById("uploadButton");
        const searchButton = document.getElementById("searchButton");
        const clearButton = document.getElementById("clearButton");
        const deleteRecordButton = document.getElementById("deleteRecordButton");
        const cancelButton = document.getElementById("cancelButton");
        const commentButton = document.getElementById("commentButton");
        const renameButton = document.getElementById("renameButton");
        const deleteButton = document.getElementById("deleteButton");
        const refreshListButton = document.getElementById("refreshListButton");
        const imageList = document.getElementById("imageList");
        const imageCount = document.getElementById("imageCount");
        const lightbox = document.getElementById("lightbox");
        const lightboxTitle = document.getElementById("lightboxTitle");
        const lightboxImage = document.getElementById("lightboxImage");
        const lightboxPdf = document.getElementById("lightboxPdf");
        const lightboxComment = document.getElementById("lightboxComment");
        const lightboxClose = document.getElementById("lightboxClose");

        const defaultOwner = "img-0403";
        const defaultRepo = "PicScan";
        const knownExtensions = [".jpg", ".jpeg", ".png", ".webp", ".gif", ".pdf"];
        const githubContentsMaxBytes = 100 * 1024 * 1024;
        let session = null;
        let currentImage = null;
        let recordImageClickTimer = null;
        const localPreviewUrls = new Map();

        function setStatus(message) {
            statusBox.textContent = message;
        }

        function githubErrorMessage(status, body, fallbackText = "") {
            const detail = body && typeof body.message === "string"
                ? body.message
                : fallbackText.trim();
            if (status === 401) {
                return "GitHub Tokenが無効、または期限切れです。Tokenを確認して再接続してください。";
            }
            if (status === 403) {
                return "GitHubへの書き込み権限がありません。Tokenに対象リポジトリの Contents: Read and write 権限を付けてください。";
            }
            if (status === 409) {
                return "GitHub上のデータが同時に更新されました。一覧更新後、もう一度保存してください。";
            }
            if (status === 413) {
                return "選択したファイルが大きすぎるため保存できません。100MB未満のファイルを選択してください。";
            }
            if (status === 422) {
                return `GitHubが保存内容を受け付けませんでした。Tokenの書き込み権限とファイル名を確認してください。${detail ? ` (${detail})` : ""}`;
            }
            return `GitHub API error ${status}${detail ? `: ${detail}` : ""}`;
        }

        function setBusy(isBusy) {
            [loginButton, uploadButton, searchButton, clearButton, deleteRecordButton, cancelButton, commentButton, renameButton, deleteButton, refreshListButton].forEach((button) => {
                button.disabled = isBusy;
            });
            imageList.querySelectorAll("button").forEach((button) => {
                button.disabled = isBusy;
            });
            recordImageGrid.querySelectorAll("button").forEach((button) => {
                button.disabled = isBusy;
            });
            if (!isBusy) {
                updateResultActions();
            }
        }

        function updateResultActions() {
            const hasImage = Boolean(currentImage);
            commentButton.disabled = !hasImage;
            renameButton.disabled = !hasImage || !currentImage.bytes;
            deleteButton.disabled = !hasImage;
            deleteRecordButton.disabled = !hasImage;
        }

        function clearPreviewDisplay() {
            currentImage = null;
            resultMeta.textContent = "";
            resultComment.textContent = "";
            resultComment.classList.add("hidden");
            recordImageGrid.textContent = "";
            previewPanel.classList.add("hidden");
            updateResultActions();
        }

        function appendEmptyDataMessage(container) {
            const message = document.createElement("p");
            message.className = "emptyDataMessage";
            message.textContent = "表示データはありません";
            container.appendChild(message);
        }

        function showEmptyPreview() {
            currentImage = null;
            resultMeta.textContent = "";
            resultComment.textContent = "";
            resultComment.classList.add("hidden");
            recordImageGrid.textContent = "";
            appendEmptyDataMessage(recordImageGrid);
            previewPanel.classList.remove("hidden");
            updateResultActions();
        }

        function clearPreview() {
            clearPreviewDisplay();
            titleInput.value = "";
            numbersInput.value = "";
            commentInput.value = "";
            photoInput.value = "";
            modelInput.value = "";
        }

        function encodePathSegment(value) {
            return value.split("/").map(encodeURIComponent).join("/");
        }

        function normalizeImageFilePath(value) {
            let filePath = String(value || "").trim().replaceAll("\\", "/");
            filePath = filePath.replace(/^\/+/, "");
            while (filePath.toLowerCase().startsWith("images/")) {
                filePath = filePath.slice(7);
            }
            return filePath;
        }

        function imageUrl(fileName) {
            return `images/${encodePathSegment(normalizeImageFilePath(fileName))}`;
        }

        function recordImageFileCandidates(recordName, fileName) {
            const normalized = normalizeImageFilePath(fileName);
            const candidates = [];
            const addCandidate = (candidate) => {
                const clean = normalizeImageFilePath(candidate);
                if (clean && !candidates.includes(clean)) {
                    candidates.push(clean);
                }
            };

            addCandidate(normalized);
            const leafName = normalized.split("/").pop();
            const base = safeFileBase(recordName || "");
            if (base && leafName && !normalized.includes("/")) {
                addCandidate(`${base}/${leafName}`);
            }
            return candidates;
        }

        function recordImageUrls(recordName, fileName) {
            return recordImageFileCandidates(recordName, fileName).map(imageUrl);
        }

        function recordImageMatches(recordName, fileName, targetFileName) {
            const target = normalizeImageFilePath(targetFileName);
            return recordImageFileCandidates(recordName, fileName).includes(target);
        }

        function setImageWithFallback(img, urls) {
            let urlIndex = 0;
            img.onerror = () => {
                urlIndex += 1;
                if (urlIndex < urls.length) {
                    img.src = urls[urlIndex];
                    return;
                }
                const frame = img.parentElement;
                if (frame) {
                    frame.textContent = "";
                    appendEmptyDataMessage(frame);
                }
            };
            img.src = urls[0] || "";
        }

        function clearLocalPreviewUrls() {
            localPreviewUrls.forEach((url) => URL.revokeObjectURL(url));
            localPreviewUrls.clear();
        }

        function setLocalPreviewUrl(fileName, bytes) {
            const normalized = normalizeImageFilePath(fileName);
            const previousUrl = localPreviewUrls.get(normalized);
            if (previousUrl) {
                URL.revokeObjectURL(previousUrl);
            }
            const blob = new Blob([bytes], { type: contentTypeForName(normalized) });
            localPreviewUrls.set(normalized, URL.createObjectURL(blob));
        }

        function deleteLocalPreviewUrl(fileName) {
            const normalized = normalizeImageFilePath(fileName);
            const url = localPreviewUrls.get(normalized);
            if (url) {
                URL.revokeObjectURL(url);
                localPreviewUrls.delete(normalized);
            }
        }

        function isPdfFile(fileName) {
            return /\.pdf(?:$|[?#])/i.test(String(fileName || ""));
        }

        function openLightbox(title, src, comment, fileName = src) {
            lightboxTitle.textContent = title;
            const showPdf = isPdfFile(fileName);
            lightboxImage.classList.toggle("hidden", showPdf);
            lightboxPdf.classList.toggle("hidden", !showPdf);
            if (showPdf) {
                lightboxImage.removeAttribute("src");
                lightboxImage.alt = "";
                lightboxPdf.src = src;
            } else {
                lightboxPdf.removeAttribute("src");
                lightboxImage.src = src;
                lightboxImage.alt = title;
            }
            lightboxComment.textContent = comment || "";
            lightbox.classList.remove("hidden");
        }

        function closeLightbox() {
            lightbox.classList.add("hidden");
            lightboxImage.removeAttribute("src");
            lightboxImage.alt = "";
            lightboxPdf.removeAttribute("src");
        }

        function renderRecordImages(image) {
            const images = Array.isArray(image.recordImages) && image.recordImages.length
                ? image.recordImages
                : image.name
                    ? [{ file: image.name, comment: image.comment || "" }]
                    : [];
            image.recordImages = images;
            recordImageGrid.textContent = "";
            if (!images.length) {
                appendEmptyDataMessage(recordImageGrid);
                return;
            }
            const currentName = normalizeImageFilePath(image.name);
            images.slice(0, 6).forEach((entry, index) => {
                const item = document.createElement("article");
                item.className = "recordImageItem";
                const recordName = image.recordName || "";
                const entryFile = normalizeImageFilePath(entry.file);
                if (recordImageMatches(recordName, entryFile, currentName)) {
                    item.classList.add("isSelected");
                }

                const button = document.createElement("button");
                button.className = "imageZoomButton";
                button.type = "button";

                const frame = document.createElement("div");
                frame.className = "recordImageFrame";

                const publishedUrls = recordImageUrls(recordName, entryFile);
                const localPreviewUrl = recordImageFileCandidates(recordName, entryFile)
                    .map((candidate) => localPreviewUrls.get(candidate))
                    .find(Boolean);
                const urls = localPreviewUrl
                    ? [localPreviewUrl, ...publishedUrls]
                    : publishedUrls;
                const previewTitle = `${recordName || image.name} ${entryFile}`;
                let previewElement;
                if (isPdfFile(entryFile)) {
                    previewElement = document.createElement("div");
                    previewElement.className = "pdfFilePreview";
                    const badge = document.createElement("strong");
                    badge.textContent = "PDF";
                    const fileLabel = document.createElement("span");
                    fileLabel.textContent = entryFile;
                    previewElement.appendChild(badge);
                    previewElement.appendChild(fileLabel);
                } else {
                    previewElement = document.createElement("img");
                    setImageWithFallback(previewElement, urls);
                    previewElement.alt = previewTitle;
                }

                const recordCommentText = image.comment || "";

                frame.appendChild(previewElement);
                button.appendChild(frame);
                button.addEventListener("click", () => {
                    clearTimeout(recordImageClickTimer);
                    recordImageClickTimer = setTimeout(() => selectRecordImage(image, entry), 220);
                });
                button.addEventListener("dblclick", () => {
                    clearTimeout(recordImageClickTimer);
                    const previewUrl = isPdfFile(entryFile)
                        ? urls[0]
                        : (previewElement.currentSrc || previewElement.src);
                    openLightbox(previewTitle, previewUrl, recordCommentText, entryFile);
                });
                item.appendChild(button);

                const actions = document.createElement("div");
                actions.className = "recordImageActions";

                const upButton = document.createElement("button");
                upButton.type = "button";
                upButton.textContent = "前へ";
                upButton.disabled = index === 0;
                upButton.addEventListener("click", () => moveRecordImage(index, -1));

                const downButton = document.createElement("button");
                downButton.type = "button";
                downButton.textContent = "後へ";
                downButton.disabled = index === images.length - 1 || index >= 5;
                downButton.addEventListener("click", () => moveRecordImage(index, 1));

                const removeButton = document.createElement("button");
                removeButton.type = "button";
                removeButton.className = "danger";
                removeButton.textContent = "削除";
                removeButton.addEventListener("click", async (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    const targetFile = normalizeImageFilePath(entry.file);
                    setStatus(`画像削除を開始します: images/${targetFile}`);
                    await deleteRecordImage(image, entry);
                });

                actions.appendChild(upButton);
                actions.appendChild(downButton);
                actions.appendChild(removeButton);
                item.appendChild(actions);
                recordImageGrid.appendChild(item);
            });
        }

        async function selectRecordImage(recordImage, entry) {
            const record = {
                name: recordImage.recordName || modelInput.value.trim() || recordImage.name,
                title: recordImage.title || recordImage.recordName || modelInput.value.trim() || recordImage.name,

                comment: typeof recordImage.comment === "string" ? recordImage.comment : "",
                images: Array.isArray(recordImage.recordImages) ? recordImage.recordImages : []
            };
            let selected = null;
            try {
                selected = await getRecordImage(record, entry);
            } catch (error) {
                selected = null;
            }
            if (!selected) {
                const fallbackFile = recordImageFileCandidates(record.name, entry.file)[0] || normalizeImageFilePath(entry.file);
                selected = {
                    name: fallbackFile,
                    sha: "",
                    bytes: null,
                    mimeType: contentTypeForName(fallbackFile),
                    downloadUrl: imageUrl(fallbackFile),
                    comment: record.comment || ""
                };
            }
            selectCurrentImage({
                ...selected,
                recordName: record.name,
                title: record.title,
                numbers: record.numbers,
                recordImages: record.images,
                comment: record.comment || selected.comment || ""
            });

        function moveRecordImage(index, direction) {

            if (nextIndex < 0 || nextIndex >= currentImage.recordImages.length) {

            const images = currentImage.recordImages;

            images[index] = images[nextIndex];
            images[nextIndex] = moved;

        function normalizeBaseName(value) {
            return value.trim().replaceAll("\\", "/").split("/").pop();
        }

        function normalizeFileName(value, fallbackExtension = ".jpg") {
            const clean = normalizeBaseName(value);
            if (!clean) {
                return "";
            }
            return /\.[a-z0-9]+$/i.test(clean) ? clean : `${clean}${fallbackExtension}`;
        }

        function safeFileBase(value) {
            return normalizeBaseName(value)
                .replace(/\.[^.]+$/, "")
                .replace(/[<>:"/\\|?*\u0000-\u001f]/g, "_")
                .trim()
                || "image";
        }

        function parseNumbers(value) {
            return [...new Set(value.split(/[\s,、]+/)
                .map((number) => number.trim())
                .filter(Boolean))]
                .filter((number) => /^\d{4}$/.test(number));
        }

        function parseNumberTokens(value) {
            return value.split(/[\s,、]+/)
                .map((number) => number.trim())
                .filter(Boolean);
        }

        function validateSelectedFiles(files) {
            const oversized = files.find((file) => file.size >= githubContentsMaxBytes);
            if (oversized) {
                throw new Error(`${oversized.name} は100MB以上のため保存できません。ファイルサイズを小さくしてください。`);
            }
        }

        function modelCandidates(value) {
            const clean = normalizeBaseName(value);
            if (!clean) {
                return [];
            }
            if (/\.[a-z0-9]+$/i.test(clean)) {
                return [clean];
            }
            return knownExtensions.map((extension) => `${clean}${extension}`);
        }

        function buildGitHubSession() {
            const token = tokenInput.value.trim() || (session && session.token) || "";
            return {
                owner: defaultOwner,
                repo: defaultRepo,
                branch: localStorage.getItem("picscanBranch") || "main",
                token
            };
        }

        function ensureGitHubSession() {
            if (session && session.token) {
                return;
            }
            session = buildGitHubSession();
            if (!session.token) {
                throw new Error("GitHub Tokenを入力してください。");
            }
        }

        function startGitHubSession() {
            session = {
                owner: defaultOwner,
                repo: defaultRepo,
                branch: localStorage.getItem("picscanBranch") || "main",
                token: tokenInput.value.trim()
            };
            if (!session.token) {
                throw new Error("GitHub Tokenを入力してください。");
            }
        }

        function githubHeaders() {
            return {
                "Accept": "application/vnd.github+json",
                "Authorization": `Bearer ${session.token}`,
                "X-GitHub-Api-Version": "2022-11-28"
            };
        }

        async function resolveGitHubBranch() {
            const response = await fetch(`https://api.github.com/repos/${session.owner}/${session.repo}`, {
                headers: githubHeaders()
            });
            const text = await response.text();
            let body = null;
            if (text) {
                try {
                    body = JSON.parse(text);
                } catch (error) {
                    body = null;
                }
            }
            if (!response.ok) {
                if (response.status === 404) {
                    throw new Error(`GitHubリポジトリが見つかりません: ${session.owner}/${session.repo}。GitHub Tokenの権限を確認してください。`);
                }
                throw new Error(githubErrorMessage(response.status, body, text));
            }
            if (body && body.permissions && body.permissions.push === false) {
                throw new Error("このGitHubアカウントにはリポジトリへの書き込み権限がありません。Repositoryの権限を確認してください。");
            }
            const defaultBranch = body && body.default_branch ? body.default_branch : session.branch;
            session.branch = defaultBranch;
            localStorage.setItem("picscanBranch", defaultBranch);
            return defaultBranch;
        }

        function contentUrl(fileName = "", includeRef = true) {
            const encodedName = encodeURIComponent(normalizeImageFilePath(fileName)).replaceAll("%2F", "/");
            const path = encodedName ? `/contents/images/${encodedName}` : "/contents/images";
            const base = `https://api.github.com/repos/${session.owner}/${session.repo}${path}`;
            return includeRef ? `${base}?ref=${encodeURIComponent(session.branch)}` : base;
        }

        function repoContentUrl(path, includeRef = true) {
            const encodedPath = path.split("/").map(encodeURIComponent).join("/");
            const base = `https://api.github.com/repos/${session.owner}/${session.repo}/contents/${encodedPath}`;
            return includeRef ? `${base}?ref=${encodeURIComponent(session.branch)}` : base;
        }

        async function githubRequest(url, options = {}) {
            const response = await fetch(url, options);
            const text = await response.text();
            let body = null;
            if (text) {
                try {
                    body = JSON.parse(text);
                } catch (error) {
                    body = null;
                }
            }
            if (!response.ok) {
                throw new Error(githubErrorMessage(response.status, body, text));
            }
            return body;
        }

        function decodeBase64Text(content) {
            const binary = atob(content.replace(/\n/g, ""));
            const bytes = new Uint8Array(binary.length);
            for (let index = 0; index < binary.length; index += 1) {
                bytes[index] = binary.charCodeAt(index);
            }
            return new TextDecoder().decode(bytes);
        }

        function encodeBase64Text(text) {
            const bytes = new TextEncoder().encode(text);
            let binary = "";
            const chunkSize = 8192;
            for (let offset = 0; offset < bytes.length; offset += chunkSize) {
                const chunk = bytes.slice(offset, offset + chunkSize);
                binary += String.fromCharCode(...chunk);
            }
            return btoa(binary);
        }

        async function loadCommentsFile() {
            const response = await fetch(repoContentUrl("comments.json"), {
                headers: githubHeaders()
            });
            if (response.status === 404) {
                return { sha: null, comments: {} };
            }
            const body = await response.json();
            if (!response.ok) {
                throw new Error(`GitHub API error ${response.status}: ${body.message || "request failed"}`);
            }

            let comments = {};
            try {
                comments = JSON.parse(decodeBase64Text(body.content));
            } catch (error) {
                comments = {};
            }
            return { sha: body.sha, comments: comments && typeof comments === "object" ? comments : {} };
        }

        async function saveCommentsFile(comments, sha) {
            const payload = {
                message: "Update image comments",
                branch: session.branch,
                content: encodeBase64Text(`${JSON.stringify(comments, null, 2)}\n`)
            };
            if (sha) {
                payload.sha = sha;
            }
            await githubRequest(repoContentUrl("comments.json", false), {
                method: "PUT",
                headers: {
                    ...githubHeaders(),
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });
        }

        async function loadCatalogFile() {
            const response = await fetch(repoContentUrl("catalog.json"), {
                headers: githubHeaders()
            });
            if (response.status === 404) {
                return { sha: null, catalog: { records: [] } };
            }
            const body = await response.json();
            if (!response.ok) {
                throw new Error(`GitHub API error ${response.status}: ${body.message || "request failed"}`);
            }

            let catalog = { records: [] };
            try {
                catalog = JSON.parse(decodeBase64Text(body.content));
            } catch (error) {
                catalog = { records: [] };
            }
            return { sha: body.sha, catalog: normalizeCatalog(catalog) };
        }

        function normalizeCatalog(catalog) {
            const records = Array.isArray(catalog)
                ? catalog
                : Array.isArray(catalog && catalog.records)
                    ? catalog.records
                    : [];
            const merged = [];
            records.map((record) => ({
                name: String(record && record.name || "").trim(),
                title: String(record && record.title || record && record.displayName || "").trim(),
                numbers: Array.isArray(record && record.numbers)
                    ? record.numbers.map((number) => String(number).trim()).filter((number) => /^\d{4}$/.test(number))
                    : [],
                comment: typeof (record && record.comment) === "string"
                    ? record.comment
                    : "",
                images: Array.isArray(record && record.images)
                    ? record.images.slice(0, 6).map((image) => ({
                        file: normalizeImageFilePath(image && (image.file || image.name)),
                        comment: typeof (image && image.comment) === "string" ? image.comment : ""
                    })).filter((image) => image.file)
                    : []
            })).filter((record) => record.name).forEach((record) => {
                if (!record.comment) {
                    const legacyComment = record.images.find((image) => image.comment)?.comment || "";
                    record.comment = legacyComment;
                }
                if (!record.title) {
                    record.title = record.name;
                }
                record.images = record.images.map((image) => ({ file: image.file }));
                const existing = merged.find((item) => item.name.toLowerCase() === record.name.toLowerCase());
                if (!existing) {
                    merged.push(record);
                    return;
                }
                if (!existing.comment && record.comment) {
                    existing.comment = record.comment;
                }
                if ((!existing.title || existing.title === existing.name) && record.title) {
                    existing.title = record.title;
                }
                existing.numbers = [...new Set([...existing.numbers, ...record.numbers])];
                record.images.forEach((image) => {
                    if (existing.images.length < 6 && !existing.images.some((item) => item.file === image.file)) {
                        existing.images.push(image);
                    }
                });
            });
            return {
                records: merged
            };
        }

        function recordComment(record) {
            if (!record) {
                return "";
            }
            if (typeof record.comment === "string" && record.comment) {
                return record.comment;
            }
            return Array.isArray(record.images)
                ? (record.images.find((image) => image && image.comment)?.comment || "")
                : "";
        }

        async function saveCatalogFile(catalog, sha) {
            const payload = {
                message: "Update image catalog",
                branch: session.branch,
                content: encodeBase64Text(`${JSON.stringify(normalizeCatalog(catalog), null, 2)}\n`)
            };
            if (sha) {
                payload.sha = sha;
            }
            await githubRequest(repoContentUrl("catalog.json", false), {
                method: "PUT",
                headers: {
                    ...githubHeaders(),
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });
        }

        function findCatalogRecord(catalog, value) {
            const query = value.trim();
            const normalized = query.toLowerCase();
            return catalog.records.find((record) => record.name.toLowerCase() === normalized)
                || catalog.records.find((record) => record.numbers.includes(query));
        }

        function findRecordByImage(catalog, fileName) {
            const normalized = normalizeImageFilePath(fileName);
            return catalog.records.find((record) => record.images.some((image) => recordImageMatches(record.name, image.file, normalized)));
        }

        function findRecordIndexByImage(catalog, fileName) {
            const normalized = normalizeImageFilePath(fileName);
            return catalog.records.findIndex((record) => record.images.some((image) => recordImageMatches(record.name, image.file, normalized)));
        }

        function findRecordByName(catalog, name) {
            const normalized = name.trim().toLowerCase();
            return catalog.records.find((record) => record.name.toLowerCase() === normalized);
        }

        function findOtherRecordByName(catalog, name, currentRecord) {
            const normalized = name.trim().toLowerCase();
            return catalog.records.find((record) => record !== currentRecord && record.name.toLowerCase() === normalized);
        }

        function nextCatalogFileName(recordName, existingImages, originalFileName) {
            const extension = originalFileName.match(/\.[a-z0-9]+$/i)?.[0] || ".jpg";
            const base = safeFileBase(recordName);
            for (let index = 1; index <= 6; index += 1) {
                const candidate = `${base}/${base}_${index}${extension}`;
                if (!existingImages.some((image) => image.file === candidate)) {
                    return candidate;
                }
            }
            return "";
        }

        function currentRecordImagesForSave(record, selectedImage) {
            const currentImages = Array.isArray(selectedImage.recordImages)
                ? selectedImage.recordImages.slice(0, 6)
                    .filter((image) => image && image.file)
                    .map((image) => ({ file: normalizeImageFilePath(image.file) }))
                : [];
            if (!currentImages.length) {
                return record.images;
            }
            const hasEveryExistingImage = record.images.every((existingImage) => (
                currentImages.some((currentImage) => (
                    recordImageMatches(record.name, currentImage.file, existingImage.file)
                        || recordImageMatches(record.name, existingImage.file, currentImage.file)
                ))
            ));
            return hasEveryExistingImage ? currentImages : record.images;
        }

        async function attachCatalogToImage(image) {
            const { catalog } = await loadCatalogFile();
            const record = findRecordByImage(catalog, image.name);
            if (!record) {
                return image;
            }
            const item = record.images.find((entry) => entry.file === image.name);
            return {
                ...image,
                recordName: record.name,
                title: record.title || record.name,
                numbers: record.numbers,
                recordImages: record.images,
                comment: recordComment(record) || (item && item.comment ? item.comment : image.comment)
            };
        }

        function commentKey(fileName) {
            return `images/${normalizeImageFilePath(fileName)}`;
        }

        function readComment(comments, fileName) {
            const normalized = normalizeImageFilePath(fileName);
            const value = comments[commentKey(normalized)] ?? comments[normalized] ?? comments[fileName] ?? "";
            if (typeof value === "string") {
                return value;
            }
            return value && typeof value.comment === "string" ? value.comment : "";
        }

        async function getComment(fileName) {
            const { comments } = await loadCommentsFile();
            return readComment(comments, fileName);
        }

        async function setComment(fileName, comment) {
            const { sha, comments } = await loadCommentsFile();
            const key = commentKey(fileName);
            const trimmedComment = comment.trim();
            delete comments[fileName];
            if (trimmedComment) {
                comments[key] = trimmedComment;
            } else {
                delete comments[key];
            }
            await saveCommentsFile(comments, sha);
        }

        async function moveComment(oldFileName, newFileName) {
            const { sha, comments } = await loadCommentsFile();
            const oldKey = commentKey(oldFileName);
            const newKey = commentKey(newFileName);
            const value = comments[oldKey] ?? comments[oldFileName];
            delete comments[oldKey];
            delete comments[oldFileName];
            if (value) {
                comments[newKey] = value;
            }
            await saveCommentsFile(comments, sha);
        }

        async function deleteComment(fileName) {
            const { sha, comments } = await loadCommentsFile();
            delete comments[commentKey(fileName)];
            delete comments[fileName];
            await saveCommentsFile(comments, sha);
        }

        async function listImages() {
            const response = await fetch(contentUrl(), {
                headers: githubHeaders()
            });
            const text = await response.text();
            const body = text ? JSON.parse(text) : null;
            if (response.status === 404) {
                return [];
            }
            if (!response.ok) {
                throw new Error(`GitHub API error ${response.status}: ${body && body.message ? body.message : text}`);
            }
            return Array.isArray(body)
                ? body.filter((item) => item.type === "file").sort((a, b) => a.name.localeCompare(b.name, "ja"))
                : [];
        }

        function renderImageList(records) {
            imageList.textContent = "";
            if (!records.length) {
                appendEmptyDataMessage(imageList);
                return;
            }

            records.forEach((record) => {
                const row = document.createElement("div");
                row.className = "imageListRow";

                const name = document.createElement("p");
                name.className = "imageListName";
                const numberText = record.numbers && record.numbers.length ? ` / ${record.numbers.join(", ")}` : "";
                const titleText = record.title && record.title !== record.name ? ` / ${record.title}` : "";
                name.textContent = `${record.name}${titleText} (${record.images.length}枚)${numberText}`;

                const selectButton = document.createElement("button");
                selectButton.className = "secondary";
                selectButton.type = "button";
                selectButton.textContent = "選択";
                selectButton.addEventListener("click", () => selectListedRecord(record));

                const removeButton = document.createElement("button");
                removeButton.className = "danger";
                removeButton.type = "button";
                removeButton.textContent = "削除";
                removeButton.addEventListener("click", () => deleteListedRecord(record));

                row.appendChild(name);
                row.appendChild(selectButton);
                row.appendChild(removeButton);
                imageList.appendChild(row);
            });
        }

        async function refreshImageList() {
            setStatus("登録ファイル一覧を取得中...");
            const { catalog } = await loadCatalogFile();
            const repoBase = `https://api.github.com/repos/${session.owner}/${session.repo}`;
            const branchPath = encodeURIComponent(session.branch);
            const tree = await githubRequest(`${repoBase}/git/trees/${branchPath}?recursive=1`, {
                headers: githubHeaders()
            });
            const repositoryImagePaths = new Set((Array.isArray(tree && tree.tree) ? tree.tree : [])
                .filter((item) => item.type === "blob" && item.path.startsWith("images/"))
                .map((item) => item.path.slice(7)));
            const records = catalog.records
                .map((record) => ({
                    ...record,
                    images: record.images.filter((image) => (
                        recordImageFileCandidates(record.name, image.file)
                            .some((candidate) => repositoryImagePaths.has(candidate))
                    ))
                }))
                .sort((a, b) => a.name.localeCompare(b.name, "ja"));
            const totalImages = records.reduce((total, record) => total + record.images.length, 0);
            imageCount.textContent = `表示データ枚数: ${totalImages}枚`;
            renderImageList(records);
            setStatus(`登録ファイル一覧を表示しました: ${records.length}件 / ${totalImages}枚`);
        }

        async function getRecordImage(record, imageEntry) {
            for (const candidate of recordImageFileCandidates(record.name, imageEntry.file)) {
                const image = await getImage(candidate);
                if (image) {
                    return image;
                }
            }
            return null;
        }

        async function getImageMetadataForDelete(recordName, fileName) {
            const repoBase = `https://api.github.com/repos/${session.owner}/${session.repo}`;
            const branchPath = encodeURIComponent(session.branch);
            const tree = await githubRequest(`${repoBase}/git/trees/${branchPath}?recursive=1`, {
                headers: githubHeaders()
            });
            const files = Array.isArray(tree && tree.tree) ? tree.tree : [];
            for (const candidate of recordImageFileCandidates(recordName, fileName)) {
                const repositoryPath = `images/${candidate}`;
                const item = files.find((entry) => entry.type === "blob" && entry.path === repositoryPath);
                if (item && item.sha) {
                    return {
                        name: candidate,
                        sha: item.sha,
                        bytes: null,
                        mimeType: contentTypeForName(candidate),
                        downloadUrl: imageUrl(candidate)
                    };
                }
            }
            return null;
        }

        async function selectListedRecord(record) {
            try {
                ensureGitHubSession();
                setBusy(true);
                const first = record.images[0];
                if (!first) {
                    setStatus("ファイルが見つかりませんでした。");
                    await refreshImageList();
                    return;
                }
                setStatus(`読み込み中: ${record.name}`);
                let image = null;
                try {
                    image = await getRecordImage(record, first);
                } catch (error) {
                    image = null;
                }
                if (!image) {
                    const fallbackFile = recordImageFileCandidates(record.name, first.file)[0] || normalizeImageFilePath(first.file);
                    image = {
                        name: fallbackFile,
                        sha: "",
                        bytes: null,
                        mimeType: contentTypeForName(first.file),
                        downloadUrl: imageUrl(fallbackFile),
                        comment: recordComment(record)
                    };
                }
                image = {
                    ...image,
                    recordName: record.name,
                    title: record.title || record.name,
                    numbers: record.numbers,
                    recordImages: record.images,
                    comment: recordComment(record) || image.comment
                };
                modelInput.value = record.name;
                showPreview(image);
                setStatus(`選択しました: ${record.name}`);
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        }

        async function deleteListedRecord(record) {
            if (!confirm(`${record.name} と登録ファイル ${record.images.length}件を削除しますか？`)) {
                return;
            }

            try {
                ensureGitHubSession();
                setBusy(true);
                const { sha, catalog } = await loadCatalogFile();
                const target = catalog.records.find((item) => item.name.toLowerCase() === record.name.toLowerCase());
                if (!target) {
                    setStatus("削除対象が見つかりませんでした。");
                    await refreshImageList();
                    return;
                }
                setStatus(`削除中: ${target.name}`);
                for (const image of target.images) {
                    const imageFile = await getImageMetadataForDelete(target.name, image.file);
                    if (imageFile) {
                        await deleteImage(imageFile.name, imageFile.sha);
                    }
                    deleteLocalPreviewUrl(image.file);
                    try {
                        await deleteComment(image.file);
                    } catch (error) {
                        // コメントの後片付けに失敗しても、ファイルと登録情報の削除は続ける。
                    }
                }
                catalog.records = catalog.records.filter((item) => item !== target);
                await saveCatalogFile(catalog, sha);
                if (currentImage && currentImage.recordName && currentImage.recordName.toLowerCase() === target.name.toLowerCase()) {
                    clearPreview();
                }
                await refreshImageList();
                setStatus(`削除しました: ${target.name}`);
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        }

        async function getImage(fileName) {
            const normalizedFileName = normalizeImageFilePath(fileName);
            const response = await fetch(contentUrl(normalizedFileName), {
                headers: githubHeaders()
            });
            if (response.status === 404) {
                return null;
            }
            const body = await response.json();
            if (!response.ok) {
                throw new Error(`GitHub API error ${response.status}: ${body.message || "request failed"}`);
            }
            let bytes = null;
            if (typeof body.content === "string" && body.content) {
                const binary = atob(body.content.replace(/\n/g, ""));
                bytes = new Uint8Array(binary.length);
                for (let index = 0; index < binary.length; index += 1) {
                    bytes[index] = binary.charCodeAt(index);
                }
            } else if (body.download_url) {
                const imageResponse = await fetch(body.download_url, {
                    headers: {
                        "Authorization": `Bearer ${session.token}`
                    }
                });
                if (imageResponse.ok) {
                    bytes = new Uint8Array(await imageResponse.arrayBuffer());
                }
            }
            const comment = await getComment(normalizedFileName);
            return {
                name: normalizedFileName,
                sha: body.sha,
                bytes,
                mimeType: contentTypeForName(fileName),
                downloadUrl: body.download_url,
                comment
            };
        }

        async function getImageFromDownloadUrl(file) {
            if (!file.download_url) {
                return null;
            }
            const response = await fetch(file.download_url, {
                headers: {
                    "Authorization": `Bearer ${session.token}`
                }
            });
            if (!response.ok) {
                return {
                    name: file.name,
                    sha: file.sha,
                    bytes: null,
                    mimeType: contentTypeForName(file.name),
                    downloadUrl: file.download_url,
                    comment: await getComment(file.name)
                };
            }
            return {
                name: file.name,
                sha: file.sha,
                bytes: new Uint8Array(await response.arrayBuffer()),
                mimeType: response.headers.get("Content-Type") || contentTypeForName(file.name),
                downloadUrl: file.download_url,
                comment: await getComment(file.name)
            };
        }

        async function findImage(value) {
            const { catalog } = await loadCatalogFile();
            const record = findCatalogRecord(catalog, value);
            if (record && record.images.length) {
                const first = record.images[0];
                const image = await getImage(first.file);
                if (image) {
                    return {
                        ...image,
                        recordName: record.name,
                        title: record.title || record.name,
                        numbers: record.numbers,
                        recordImages: record.images,
                        comment: recordComment(record) || image.comment
                    };
                }
            }

            const candidates = modelCandidates(value);
            for (const candidate of candidates) {
                const image = await getImage(candidate);
                if (image) {
                    return attachCatalogToImage(image);
                }
            }

            const clean = normalizeBaseName(value);
            if (!clean || /\.[a-z0-9]+$/i.test(clean)) {
                return null;
            }

            const files = await listImages();
            const matched = files.find((file) => {
                const baseName = file.name.replace(/\.[^.]+$/, "");
                return baseName.toLowerCase() === clean.toLowerCase();
            });
            return matched ? attachCatalogToImage(await getImage(matched.name)) : null;
        }

        async function findImageByInputs(modelValue, titleValue, numbers) {
            const modelQuery = modelValue.trim().toLowerCase();
            const titleQuery = titleValue.trim().toLowerCase();
            if (!titleQuery && !numbers.length) {
                return findImage(modelValue);
            }

            const { catalog } = await loadCatalogFile();
            const record = catalog.records.find((item) => {
                const matchesModel = !modelQuery
                    || item.name.toLowerCase() === modelQuery
                    || item.numbers.includes(modelValue.trim());
                const matchesTitle = !titleQuery
                    || (item.title || item.name).toLowerCase().includes(titleQuery);
                const matchesNumbers = !numbers.length
                    || numbers.every((number) => item.numbers.includes(number));
                return matchesModel && matchesTitle && matchesNumbers;
            });
            if (!record || !record.images.length) {
                return null;
            }

            const image = await getRecordImage(record, record.images[0]);
            if (!image) {
                return null;
            }
            return {
                ...image,
                recordName: record.name,
                title: record.title || record.name,
                numbers: record.numbers,
                recordImages: record.images,
                comment: recordComment(record) || image.comment
            };
        }

        function contentTypeForName(fileName) {
            const extension = fileName.split(".").pop().toLowerCase();
            if (extension === "pdf") {
                return "application/pdf";
            }
            if (extension === "png") {
                return "image/png";
            }
            if (extension === "webp") {
                return "image/webp";
            }
            if (extension === "gif") {
                return "image/gif";
            }
            return "image/jpeg";
        }

        function bytesToBase64(bytes) {
            let binary = "";
            const chunkSize = 8192;
            for (let offset = 0; offset < bytes.length; offset += chunkSize) {
                const chunk = bytes.slice(offset, offset + chunkSize);
                binary += String.fromCharCode(...chunk);
            }
            return btoa(binary);
        }

        async function putImage(fileName, bytes, sha = null, message = `Upload ${fileName}`) {
            const payload = {
                message,
                branch: session.branch,
                content: bytesToBase64(bytes)
            };
            if (sha) {
                payload.sha = sha;
            }
            await githubRequest(contentUrl(fileName, false), {
                method: "PUT",
                headers: {
                    ...githubHeaders(),
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });
        }

        async function deleteImage(fileName, sha, message = `Delete ${fileName}`) {
            try {
                await githubRequest(contentUrl(fileName, false), {
                    method: "DELETE",
                    headers: {
                        ...githubHeaders(),
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message,
                        branch: session.branch,
                        sha
                    })
                });
            } catch (error) {
                const isNetworkDeleteFailure = error instanceof TypeError
                    || /failed to fetch|networkerror|network request failed/i.test(error.message || "");
                if (!isNetworkDeleteFailure) {
                    throw error;
                }
                setStatus(`XHR通信で削除中: images/${fileName}`);
                try {
                    await deleteImageWithXhr(fileName, sha, message);
                    return;
                } catch (xhrError) {
                    // WebViewなどでfetchのDELETEだけが失敗する場合にXHRを試し、失敗時はコミット方式へ進む。
                }
                setStatus(`GraphQLコミットで削除中: images/${fileName}`);
                try {
                    await deleteImageWithGraphQL(fileName, message);
                } catch (graphqlError) {
                    const isGraphqlNetworkFailure = graphqlError instanceof TypeError
                        || /failed to fetch|networkerror|network request failed/i.test(graphqlError.message || "");
                    if (!isGraphqlNetworkFailure) {
                        throw new Error(`GraphQL削除エラー: ${graphqlError.message}`);
                    }
                    setStatus(`Git Dataコミットで削除中: images/${fileName}`);
                    try {
                        await deleteImageWithGitCommit(fileName, message);
                    } catch (gitError) {
                        throw new Error(`Git Data削除通信エラー: ${gitError.message}`);
                    }
                }
            }
        }

        function deleteImageWithXhr(fileName, sha, message) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open("DELETE", contentUrl(fileName, false), true);
                const headers = githubHeaders();
                Object.entries(headers).forEach(([name, value]) => xhr.setRequestHeader(name, value));
                xhr.setRequestHeader("Content-Type", "application/json");
                xhr.onload = () => {
                    let body = null;
                    if (xhr.responseText) {
                        try {
                            body = JSON.parse(xhr.responseText);
                        } catch (error) {
                            body = null;
                        }
                    }
                    if (xhr.status >= 200 && xhr.status < 300) {
                        resolve(body);
                        return;
                    }
                    reject(new Error(githubErrorMessage(xhr.status, body, xhr.responseText || "")));
                };
                xhr.onerror = () => reject(new Error("XHR DELETE通信に失敗しました。"));
                xhr.ontimeout = () => reject(new Error("XHR DELETE通信がタイムアウトしました。"));
                xhr.timeout = 30000;
                xhr.send(JSON.stringify({
                    message,
                    branch: session.branch,
                    sha
                }));
            });
        }

        async function deleteImageWithGraphQL(fileName, message) {
            const repoBase = `https://api.github.com/repos/${session.owner}/${session.repo}`;
            const branchPath = encodeURIComponent(session.branch);
            const ref = await githubRequest(`${repoBase}/git/ref/heads/${branchPath}`, {
                headers: githubHeaders()
            });
            const headSha = ref && ref.object && ref.object.sha;
            if (!headSha) {
                throw new Error("GitHubブランチの最新コミットを取得できませんでした。");
            }

            const query = `mutation DeleteImage($input: CreateCommitOnBranchInput!) {
                createCommitOnBranch(input: $input) {
                    commit { oid url }
                }
            }`;
            const normalized = normalizeImageFilePath(fileName);
            const response = await githubRequest("https://api.github.com/graphql", {
                method: "POST",
                headers: {
                    ...githubHeaders(),
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    query,
                    variables: {
                        input: {
                            branch: {
                                repositoryNameWithOwner: `${session.owner}/${session.repo}`,
                                branchName: session.branch
                            },
                            message: { headline: message },
                            fileChanges: {
                                deletions: [{ path: `images/${normalized}` }]
                            },
                            expectedHeadOid: headSha
                        }
                    }
                })
            });
            if (Array.isArray(response && response.errors) && response.errors.length) {
                throw new Error(response.errors.map((item) => item.message).join(" / "));
            }
            const commit = response && response.data
                && response.data.createCommitOnBranch
                && response.data.createCommitOnBranch.commit;
            if (!commit || !commit.oid) {
                throw new Error("GitHubから削除コミットの結果が返されませんでした。");
            }
        }

        async function deleteImageWithGitCommit(fileName, message) {
            const repoBase = `https://api.github.com/repos/${session.owner}/${session.repo}`;
            const branchPath = encodeURIComponent(session.branch);
            const ref = await githubRequest(`${repoBase}/git/ref/heads/${branchPath}`, {
                headers: githubHeaders()
            });
            const headSha = ref && ref.object && ref.object.sha;
            if (!headSha) {
                throw new Error("GitHubブランチの最新コミットを取得できませんでした。");
            }

            const headCommit = await githubRequest(`${repoBase}/git/commits/${encodeURIComponent(headSha)}`, {
                headers: githubHeaders()
            });
            const baseTreeSha = headCommit && headCommit.tree && headCommit.tree.sha;
            if (!baseTreeSha) {
                throw new Error("GitHubのファイルツリーを取得できませんでした。");
            }

            const normalized = normalizeImageFilePath(fileName);
            const nextTree = await githubRequest(`${repoBase}/git/trees`, {
                method: "POST",
                headers: {
                    ...githubHeaders(),
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    base_tree: baseTreeSha,
                    tree: [{
                        path: `images/${normalized}`,
                        mode: "100644",
                        type: "blob",
                        sha: null
                    }]
                })
            });
            if (!nextTree || !nextTree.sha) {
                throw new Error("画像を除外したGitHubツリーを作成できませんでした。");
            }

            const nextCommit = await githubRequest(`${repoBase}/git/commits`, {
                method: "POST",
                headers: {
                    ...githubHeaders(),
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message,
                    tree: nextTree.sha,
                    parents: [headSha]
                })
            });
            if (!nextCommit || !nextCommit.sha) {
                throw new Error("画像削除用のGitHubコミットを作成できませんでした。");
            }

            await githubRequest(`${repoBase}/git/refs/heads/${branchPath}`, {
                method: "PATCH",
                headers: {
                    ...githubHeaders(),
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    sha: nextCommit.sha,
                    force: false
                })
            });
        }

            }

            try {
                ensureGitHubSession();
                setBusy(true);
                if (files.length) {
                    clearLocalPreviewUrls();
                }
                const { sha, catalog } = await loadCatalogFile();
                const comment = commentInput.value.trim();
                let record = null;
                let previewFileName = "";

                if (currentImage) {
                    const recordIndex = findRecordIndexByImage(catalog, currentImage.name);
                    if (recordIndex >= 0) {
                        record = catalog.records[recordIndex];
                    } else {
                        record = {
                            name: currentImage.recordName || recordName,

                        return;

                    record.name = recordName;

                    let imageEntry = record.images.find((image) => recordImageMatches(record.name, image.file, currentImage.name));
                    if (!imageEntry) {

                        record.images.unshift(imageEntry);
                    }
                    previewFileName = imageEntry.file;

                    const appendFiles = files;
                    const remaining = 6 - record.images.length;
                    if (appendFiles.length > remaining) {
                        setStatus(`最大6件までです。追加ファイルは先頭${Math.max(remaining, 0)}件だけ保存します。`);
                    }
                    for (const file of appendFiles.slice(0, Math.max(remaining, 0))) {
                        const fileName = nextCatalogFileName(record.name, record.images, file.name);
                        if (!fileName) {
                            break;
                        }
                        setStatus(`画像を保存中 (${record.images.length + 1}/6): ${file.name}`);

                        }
                        setLocalPreviewUrl(fileName, bytes);
                        record.images.push({ file: fileName });
                        if (previewFileName === imageEntry.file) {
                            previewFileName = fileName;
                        }

                } else {
                    record = findRecordByName(catalog, recordName);
                    if (!record) {
                        record = { name: recordName, title: recordTitle, numbers: [], comment: "", images: [] };
                        catalog.records.push(record);

                    record.title = recordTitle;
                    record.numbers = numbers.length ? numbers : record.numbers;
                    record.comment = comment;

                    const remaining = 6 - record.images.length;
                    if (remaining <= 0) {

                        if (!previewFileName) {
                            previewFileName = fileName;
                        }

                try {
                    await saveCatalogFile(catalog, sha);

            }
