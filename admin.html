        });

        async function deleteRecordImage(recordImage, entry) {
            const targetFile = normalizeImageFilePath(entry && entry.file ? entry.file : recordImage.name);
            const recordName = recordImage.recordName || modelInput.value.trim() || recordImage.name;
            try {
                ensureGitHubSession();
                setBusy(true);
                setStatus(`削除対象を確認中: images/${targetFile}`);
                let imageForDelete;
                try {
                    imageForDelete = await getImageMetadataForDelete(recordName, targetFile);
                } catch (error) {
                    throw new Error(`削除対象確認エラー: ${error.message}`);
                }
                if (!imageForDelete || !imageForDelete.sha) {
                    setStatus("削除対象のファイルが見つかりませんでした。");
                    return;
                }
                await deleteImage(imageForDelete.name, imageForDelete.sha);
                deleteLocalPreviewUrl(imageForDelete.name);
                const { sha, catalog } = await loadCatalogFile();
                let nextRecord = null;
                let nextEntry = null;
                const record = findRecordByImage(catalog, imageForDelete.name)
                    || findRecordByImage(catalog, targetFile)
                    || findRecordByName(catalog, recordName);
                if (record) {
                    const removedIndex = record.images.findIndex((image) => recordImageMatches(record.name, image.file, imageForDelete.name));
                    record.images = record.images.filter((image) => !recordImageMatches(record.name, image.file, imageForDelete.name));
                    catalog.records = catalog.records.filter((item) => item.images.length > 0 || item.name !== record.name);
                    if (record.images.length) {
                        nextRecord = record;
                        nextEntry = record.images[Math.min(Math.max(removedIndex, 0), record.images.length - 1)];
                    }
                    await saveCatalogFile(catalog, sha);
                }
                try {
                    await deleteComment(imageForDelete.name);
                } catch (error) {
                    // コメントの後片付けに失敗しても削除済みの状態を維持する。
                }
                if (nextRecord && nextEntry) {
                    await selectRecordImage({
                        name: nextEntry.file,
                        recordName: nextRecord.name,
                        title: nextRecord.title || nextRecord.name,
                        numbers: nextRecord.numbers,
                        recordImages: nextRecord.images,
                        comment: recordComment(nextRecord)
                    }, nextEntry);
                } else {
                    clearPreview();
                }
                await refreshImageList();
                setStatus(`GitHubと登録データから削除しました: images/${imageForDelete.name}`);
            } catch (error) {
                setStatus(`画像の削除に失敗しました: ${error.message}`);
            } finally {
                setBusy(false);
            }
        }

        deleteButton.addEventListener("click", async () => {
            if (!currentImage) {
                return;
            }
            if (!confirm(`images/${currentImage.name} を削除しますか？`)) {
                return;
            }
            await deleteRecordImage(currentImage, { file: currentImage.name });
        });

        refreshListButton.addEventListener("click", async () => {
            try {
                ensureGitHubSession();
                setBusy(true);
                await refreshImageList();
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        });

        lightboxClose.addEventListener("click", closeLightbox);
        lightbox.addEventListener("click", (event) => {
            if (event.target === lightbox) {
                closeLightbox();
            }
        });
        window.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                closeLightbox();
            }
        });
        window.addEventListener("beforeunload", clearLocalPreviewUrls);
    </script>
</body>
</html>
