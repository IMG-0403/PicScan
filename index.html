<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Honeywell バーコードリーダー デバイス情報</title>
  <style>
    body {
      font-family: "Yu Gothic UI", "Meiryo", sans-serif;
      margin: 0;
      background: #f4f6f8;
      color: #17202a;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 34px 28px;
    }

    h1 {
      font-size: 34px;
      margin: 0 0 24px;
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin: 12px 0;
    }

    label {
      font-weight: 700;
      min-width: 100px;
    }

    input {
      font-size: 17px;
      padding: 8px 10px;
      border: 1px solid #c9d1d9;
      border-radius: 4px;
    }

    input.command {
      flex: 1;
    }

    button {
      font-size: 16px;
      padding: 9px 24px;
      border: 1px solid #b8c2cc;
      border-radius: 6px;
      background: white;
      cursor: pointer;
    }

    button.primary {
      background: #1976d2;
      color: white;
      border-color: #1976d2;
    }

    button:disabled {
      opacity: .55;
      cursor: default;
    }

    .status {
      font-weight: 700;
      margin-top: 20px;
    }

    .ok {
      color: #159447;
    }

    .ng {
      color: #c62828;
    }

    .wait {
      color: #d68100;
    }

    .details {
      white-space: pre-wrap;
      color: #65717d;
      line-height: 1.45;
      margin: 8px 0 18px;
    }

    .serial-label {
      font-weight: 700;
      margin-top: 12px;
    }

    .serial {
      font-size: 52px;
      font-weight: 800;
      color: #144a82;
      line-height: 1.15;
      margin: 6px 0 22px;
    }

    .response-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 22px;
    }

    .response-head h2 {
      font-size: 22px;
      margin: 0;
      flex: 1;
    }

    textarea {
      width: 100%;
      height: 330px;
      box-sizing: border-box;
      font-family: Consolas, monospace;
      font-size: 17px;
      padding: 12px;
      border: 1px solid #c9d1d9;
      border-radius: 4px;
      background: white;
      white-space: pre;
      overflow: auto;
    }

    .note {
      color: #65717d;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<main>
  <h1>Honeywell バーコードリーダー デバイス情報</h1>

  <div class="row">
    <label>接続デバイス</label>
    <input id="device" style="flex:1" readonly>
    <button id="detect">再検出</button>
  </div>

  <div class="row">
    <input id="command" class="command" autocomplete="off">
    <button id="send">コマンド送信</button>
  </div>

  <div id="status" class="status wait">● 未接続</div>
  <div id="details" class="details"></div>

  <div class="serial-label">シリアルNo</div>
  <div id="serial" class="serial">未接続</div>

  <button id="settings" class="primary">デバイス設定出力</button>

  <div class="response-head">
    <h2>応答結果</h2>
    <button id="clear">クリア</button>
    <button id="copy">コピー</button>
  </div>

  <textarea id="response" readonly></textarea>
  <div class="note">送信コマンド: TERMID?;PREBK2?;SUFBK2?;DFMBK3?;PLGFOE?;PLGDCE?;REVINF.</div>
</main>

<script>
const $ = id => document.getElementById(id);
const API_BASE = location.origin === "http://127.0.0.1:8765"
  ? ""
  : "http://127.0.0.1:8765";

function setBusy(busy) {
  $("detect").disabled = busy;
  $("send").disabled = busy;
  $("settings").disabled = busy;
}

function setStatus(text, className) {
  $("status").textContent = "● " + text;
  $("status").className = "status " + className;
}

function applyState(state) {
  $("device").value = state.deviceName || "";
  $("details").textContent = state.deviceDetails || "";
  $("serial").textContent = state.serialNumber || "未接続";
  setStatus(
    state.status || "未接続",
    state.connected ? "ok" : ((state.status || "").includes("待機") ? "wait" : "ng")
  );
  $("send").disabled = !state.connected;
  $("settings").disabled = !state.connected;
}

async function api(path, body) {
  setBusy(true);
  try {
    const method = body ? "POST" : "GET";
    const response = await fetch(path, {
      method,
      body
    });
    if (!response.ok) {
      throw new Error("HTTP " + response.status);
    }
    return await response.json();
  } catch (error) {
    $("device").value = "";
    $("details").textContent = "ローカルアプリとの通信に失敗しました。\n" + error.message;
    $("serial").textContent = "未接続";
    setStatus("通信エラー", "ng");
    throw error;
  } finally {
    setBusy(false);
  }
}

async function detect() {
  $("device").value = "";
  $("details").textContent = "デバイスを検索しています。";
  $("serial").textContent = "未接続";
  setStatus("デバイス検出中", "wait");
  const state = await api(API_BASE + "/api/detect");
  applyState(state);
}

async function settings() {
  const result = await api(API_BASE + "/api/settings", "");
  $("response").value = result.response || "";
  applyState(result.state);
}

async function send() {
  const command = $("command").value.trim();
  if (!command) {
    alert("送信するコマンドを入力してください。");
    return;
  }

  const result = await api(API_BASE + "/api/send", "command=" + encodeURIComponent(command));
  $("response").value = result.response || "";
  applyState(result.state);
}

$("detect").onclick = detect;
$("settings").onclick = settings;
$("send").onclick = send;
$("clear").onclick = () => $("response").value = "";
$("copy").onclick = () => navigator.clipboard.writeText($("response").value || "");
$("command").addEventListener("keydown", event => {
  if (event.key === "Enter") {
    send();
  }
});

fetch(API_BASE + "/api/state")
  .then(response => response.json())
  .then(applyState)
  .then(detect);
</script>
</body>
</html>
